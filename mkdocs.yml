site_name: Bil - documentation
site_description: A modeling platform based on finite element/volume methods
site_author: P. Dangla (Université Gustave Eiffel)
repo_url: https://github.com/Universite-Gustave-Eiffel/bil
repo_name: Universite-Gustave-Eiffel/bil
docs_dir: doc/mkdocs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Introduction: index.md
  - Running Bil: running_bil.md
  - Examples:
    - Overview: examples.md
    - Flow:
      - Overview: Flow/flow_examples.md
      - M1: Flow/M1_model.md
      - M2: Flow/M2_model.md
      - Fick: Flow/Fick_model.md
    #   - M5: Flow/M5_model.md
    #   - M10-1: Flow/M10-1_model.md
    #   - M10-2: M10-2_model.md
      - Richards: Flow/Richards.md
    - Mechanics:
      - Overview: Mechanics/mechanics_examples.md
      - Elast: Mechanics/Elast_model.md
      - Elasd: Mechanics/Elasd_model.md
      - Plast: Mechanics/Plast_model.md
      - BBM: Mechanics/BBM_model.md
    - Poromechanics:
      - Overview: Poromechanics/poromechanics_examples.md
      - M7: Poromechanics/M7_model.md
      - Poroplast: Poromechanics/Poroplast_model.md
    - Phase change:
      - Overview: PhaseChange/phasechange_examples.md
      - Frostaco: PhaseChange/Frostaco_model.md
      - Frostaco3d: PhaseChange/Frostaco3d_model.md
    - Durability & Chemistry:
      - Overview: Durability/durability_examples.md
      - Duracem: Durability/Duracem_model.md
      - Chloricem: Durability/Chloricem_model.md
      - Sulfaco: Durability/Sulfaco_model.md
      - Sulfuricem: Durability/Sulfuricem_model.md
      - Sulfaconew: Durability/Sulfaconew_model.md
    - Coupled Transfers:
      - Overview: CoupledTransfers/coupledtransfers_examples.md
      - DWS1: CoupledTransfers/DWS1_model.md
      - Yuan1: CoupledTransfers/Yuan1_model.md
      - Shen: CoupledTransfers/Shen_model.md
      - usoil: CoupledTransfers/usoil_model.md
    - Specialized:
      - Overview: Specialized/specialized_examples.md
      - MechaMic: Specialized/MechaMic_model.md
    #  - M2 VoronoiFVM: Specialized/M2_VoronoiFVM.md
  - Code Architecture: code_architecture.md
  - How to Add a New Model: adding_a_model.md
